<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חנות התלת מימד של איתי ואיתי</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        
        /* עיצוב הכותרת החדשה והלוגו */
        header { 
            background-color: #2c3e50; 
            color: white; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
            text-align: center; 
        }
        .store-logo { 
            width: 85px; 
            height: 85px; 
            border-radius: 12px; 
            object-fit: contain; 
            background: rgba(255,255,255,0.08); 
            padding: 5px; 
            border: 1px solid rgba(255,255,255,0.15);
        }
        header h1 { margin: 0 0 6px 0; font-size: 1.65em; letter-spacing: 0.5px; }
        header p { margin: 0; font-size: 1.05em; color: #bdc3c7; font-weight: 300; }
        
        #announcement-banner { display: none; background-color: #e67e22; color: white; text-align: center; padding: 10px; font-weight: bold; border-radius: 8px; margin-bottom: 15px; font-size: 1em; box-shadow: 0 2px 5px rgba(230,126,34,0.2); }
        
        .controls-bar { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; }
        .filter-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
        .filter-btn { background-color: #e0e0e0; color: #333; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9em; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background-color: #3498db; color: white; }
        .sort-select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.9em; }

        .container { display: flex; gap: 20px; align-items: flex-start; }
        .catalog { flex: 3; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        
        .product { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; justify-content: space-between; border-top: 4px solid #3498db; }
        .product-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 4px; background-color: #eaeaea; margin-bottom: 10px; }
        .product h3 { margin: 5px 0; color: #2c3e50; font-size: 1.1em; }
        .category-tag { display: inline-block; background: #e8f4fd; color: #2980b9; font-size: 0.8em; padding: 3px 8px; border-radius: 10px; font-weight: bold; margin-bottom: 5px; }
        
        .color-selectors { background: #f9f9f9; padding: 8px; border-radius: 6px; margin: 10px 0; font-size: 0.85em; text-align: right; }
        .color-selectors label { display: block; margin-bottom: 3px; font-weight: bold; color: #555; }
        .color-selectors select { width: 100%; padding: 4px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 4px; }

        .price { font-weight: bold; color: #27ae60; font-size: 1.2em; margin: 10px 0; }
        button.add-to-cart { background-color: #3498db; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 1em; width: 100%; transition: background 0.2s; }
        button.add-to-cart:hover { background-color: #2980b9; }
        
        /* סל קניות וטופס */
        .cart { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 20px; min-width: 290px; }
        .cart-item { border-bottom: 1px solid #eee; padding: 8px 0; font-size: 0.9em; display: flex; justify-content: space-between; align-items: center; }
        .cart-item-details { display: flex; flex-direction: column; text-align: right; }
        .cart-item-colors { font-size: 0.8em; color: #7f8c8d; margin-top: 2px; }
        .remove-btn { background: #e74c3c; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; }
        
        .cart-options { margin-top: 15px; font-size: 0.88em; }
        .cart-options label { display: block; margin-top: 8px; color: #2c3e50; }
        .cart-options select, .cart-options input { width: 100%; padding: 8px; margin-top: 3px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit;}
        
        .checkout-btn { background-color: #25D366; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 1.1em; width: 100%; font-weight: bold; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 2px 5px rgba(37,211,102,0.3); }
        .checkout-btn:hover { background-color: #20ba5a; }
    </style>
</head>
<body>

    <!-- אזור הכותרת עם הלוגו -->
    <header>
        <img class="store-logo" src="images/logo.png" alt="לוגו חנות התלת מימד" onerror="this.src='https://placehold.co/150x150/34495e/ffffff?text=3D+Logo'">
        <div>
            <h1>חנות התלת מימד של איתי ואיתי</h1>
            <p>חנות מוצרי התלת מימד המובילה בנשר.</p>
        </div>
    </header>

    <div id="announcement-banner"></div>

    <div id="store-controls-zone">
        <div class="controls-bar">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterProducts('הכל', this)">כל המוצרים</button>
                <button class="filter-btn" onclick="filterProducts('קליקרים', this)">קליקרים</button>
                <button class="filter-btn" onclick="filterProducts('מחזיקי מפתחות', this)">מחזיקי מפתחות</button>
                <button class="filter-btn" onclick="filterProducts('חלקים נעים', this)">חלקים נעים</button>
                <button class="filter-btn" onclick="filterProducts('מיוחדים', this)">מיוחדים</button>
                <button class="filter-btn" onclick="filterProducts('מוצרים בעיצוב אישי', this)">עיצוב אישי</button>
            </div>
            <div>
                <select class="sort-select" onchange="sortProducts(this.value)">
                    <option value="default">מיין לפי...</option>
                    <option value="low-to-high">מחיר: מהנמוך לגבוה</option>
                    <option value="high-to-low">מחיר: מהגבוה לנמוך</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container" id="main-store-wrapper">
        <main class="catalog" id="catalog-container"></main>

        <aside class="cart" id="cart-aside">
            <h2>🛒 סל קניות</h2>
            <div id="cart-items"><p style="color: #777;">הסל ריק כרגע</p></div>
            
            <div class="cart-options">
                <hr style="border: 0; border-top: 1px dashed #ccc; margin: 15px 0;">
                
                <label><strong>שם מלא: *</strong></label>
                <input type="text" id="cust-name" placeholder="הכנס את שמך">

                <label><strong>טלפון נייד: *</strong></label>
                <input type="tel" id="cust-phone" placeholder="050-0000000">

                <label><strong>שיטת אספקה:</strong></label>
                <select id="delivery-method" onchange="updateCartDisplay()">
                    <option value="pickup">איסוף עצמי מנשר (חינם)</option>
                    <option value="shipping">משלוח עד הבית (+20 ₪)</option>
                </select>

                <div id="address-container" style="display: none; background: #fff8e1; padding: 5px; border-radius: 4px; border: 1px solid #ffe082;">
                    <label style="color: #d35400; margin-top: 2px;"><strong>כתובת מלאה למשלוח: *</strong></label>
                    <input type="text" id="cust-address" placeholder="עיר, רחוב, מספר בית ודירה">
                </div>

                <label><strong>אמצעי תשלום מועדף:</strong></label>
                <select id="payment-method">
                    <option value="bit">ביט (Bit)</option>
                    <option value="cash">מזומן בעת הקבלה</option>
                </select>

                <label><strong>קוד קופון:</strong></label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="coupon-code" placeholder="הקש קוד" style="margin-top:0;">
                    <button onclick="applyCoupon()" style="background:#2c3e50; color:white; border:none; border-radius:4px; padding:0 12px; cursor:pointer;">הפעל</button>
                </div>
            </div>

            <hr style="margin-top: 15px;">
            <p style="font-size: 1.2em; margin: 10px 0;"><strong>סה"כ לתשלום: <span id="cart-total">0</span> ₪</strong></p>
            
            <button class="checkout-btn" onclick="sendOrderToWhatsapp()">
                <span>שליחת הזמנה ב-WhatsApp</span>
            </button>
        </aside>
    </div>

    <script src="products.js"></script>
    <script>
        const MY_PHONE_NUMBER = "972535559309"; 

        let selectedCategory = 'הכל';
        let selectedSort = 'default';
        let cart = [];
        let discount = 0;

        function initStore() {
            if (typeof storeSettings !== 'undefined') {
                const banner = document.getElementById('announcement-banner');
                if (storeSettings.announcement && storeSettings.announcement.active && storeSettings.announcement.text) {
                    banner.innerText = storeSettings.announcement.text;
                    banner.style.display = 'block';
                }
                
                if (storeSettings.vacationMode && storeSettings.vacationMode.active) {
                    const wrapper = document.getElementById('main-store-wrapper');
                    const controls = document.getElementById('store-controls-zone');
                    const msg = storeSettings.vacationMode.message || "החנות בעומס זמני, נחזור לקבל הזמנות בקרוב.";
                    
                    controls.style.display = 'none';
                    wrapper.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; background: #fff5f5; color: #c53030; padding: 40px; border-radius: 8px; border: 2px solid #feb2b2; font-size: 1.25em; font-weight: bold; width: 100%; box-sizing: border-box; margin-top: 10px;">
                            🏖️ ${msg}
                        </div>
                    `;
                    return; 
                }
            }
            displayProducts();
        }

        function displayProducts() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = ''; 

            if (typeof catalogProducts === 'undefined') {
                container.innerHTML = '<p style="color:red; grid-column:1/-1;">שגיאה בטעינת קטלוג המוצרים.</p>';
                return;
            }

            let list = [...catalogProducts];
            if (selectedCategory !== 'הכל') { list = list.filter(p => p.category === selectedCategory); }
            if (selectedSort === 'low-to-high') { list.sort((a, b) => a.price - b.price); } 
            else if (selectedSort === 'high-to-low') { list.sort((a, b) => b.price - a.price); }

            list.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product';

                let colorsHtml = '';
                if (prod.colors) {
                    colorsHtml = `<div class="color-selectors">`;
                    if (prod.colors.primary && prod.colors.primary.length > 0) {
                        colorsHtml += `
                            <label>צבע עיקרי:</label>
                            <select id="primary-color-${prod.id}">
                                ${prod.colors.primary.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        `;
                    }
                    if (prod.colors.secondary && prod.colors.secondary.length > 0) {
                        colorsHtml += `
                            <label>צבע משני:</label>
                            <select id="secondary-color-${prod.id}">
                                ${prod.colors.secondary.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        `;
                    }
                    colorsHtml += `</div>`;
                }

                let actionButtonHtml = `<button class="add-to-cart" onclick="addToCart('${prod.id}')">הוסף לסל</button>`;
                if (prod.inStock === false) {
                    actionButtonHtml = `<button class="add-to-cart" style="background-color:#a0aec0; cursor:not-allowed;" disabled>אזל מהמלאי זמנית</button>`;
                }

                card.innerHTML = `
                    <div>
                        <span class="category-tag">${prod.category}</span>
                        <img class="product-img" src="${prod.image}" alt="${prod.name}" onerror="this.src='https://placehold.co/240x240?text=3D+Print'">
                        <h3>${prod.name}</h3>
                        <p style="font-size:0.85em; color:#666; margin:5px 0;">${prod.description}</p>
                        ${colorsHtml}
                    </div>
                    <div>
                        <p class="price">${prod.price} ₪</p>
                        ${actionButtonHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterProducts(cat, btn) {
            selectedCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProducts();
        }

        function sortProducts(sort) { selectedSort = sort; displayProducts(); }

        function addToCart(prodId) {
            const product = catalogProducts.find(p => p.id === prodId);
            let pColor = null, sColor = null;
            const pSelect = document.getElementById(`primary-color-${prodId}`);
            const sSelect = document.getElementById(`secondary-color-${prodId}`);
            if (pSelect) pColor = pSelect.value;
            if (sSelect) sColor = sSelect.value;

            cart.push({ ...product, chosenPrimary: pColor, chosenSecondary: sColor });
            updateCartDisplay();
        }

        function removeFromCart(index) { cart.splice(index, 1); updateCartDisplay(); }

        function applyCoupon() {
            const code = document.getElementById('coupon-code').value.trim().toUpperCase();
            
            if (typeof storeSettings !== 'undefined' && storeSettings.coupons) {
                const foundCoupon = storeSettings.coupons.find(c => c.code === code && c.active);
                
                if (foundCoupon) {
                    discount = foundCoupon.discountPercent / 100;
                    alert(`קופון הופעל בהצלחה! קיבלת ${foundCoupon.discountPercent}% הנחה`);
                } else {
                    discount = 0;
                    alert('קוד קופון שגוי, לא פעיל או פג תוקף');
                }
            } else {
                if (code === 'NESHER10') { discount = 0.10; alert('קופון הופעל! 10% הנחה'); } 
                else { discount = 0; alert('קוד לא תקין'); }
            }
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartContainer = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            const delivery = document.getElementById('delivery-method').value;
            const addressDiv = document.getElementById('address-container');

            if (delivery === 'shipping') {
                addressDiv.style.display = 'block';
            } else {
                addressDiv.style.display = 'none';
            }

            if (cart.length === 0) {
                cartContainer.innerHTML = '<p style="color: #777;">הסל ריק כרגע</p>';
                totalSpan.innerText = '0';
                return;
            }

            cartContainer.innerHTML = '';
            let sum = 0;

            cart.forEach((item, idx) => {
                sum += item.price;
                let colorText = '';
                if (item.chosenPrimary) colorText += `צבע: ${item.chosenPrimary}`;
                if (item.chosenSecondary) colorText += ` | משני: ${item.chosenSecondary}`;

                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div class="cart-item-details">
                        <strong>${item.name}</strong>
                        <span style="color:#27ae60;">${item.price} ₪</span>
                        ${colorText ? `<span class="cart-item-colors">${colorText}</span>` : ''}
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(${idx})">X</button>
                `;
                cartContainer.appendChild(div);
            });

            if (discount > 0) { sum = sum * (1 - discount); }
            if (delivery === 'shipping') { sum += 20; }
            totalSpan.innerText = Math.round(sum);
        }

        function sendOrderToWhatsapp() {
            if (cart.length === 0) { alert('הסל שלך ריק!'); return; }

            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const deliverySelect = document.getElementById('delivery-method');
            const deliveryVal = deliverySelect.value;
            const deliveryText = deliverySelect.options[deliverySelect.selectedIndex].text;
            const address = document.getElementById('cust-address').value.trim();
            
            const paymentSelect = document.getElementById('payment-method');
            const paymentText = paymentSelect.options[paymentSelect.selectedIndex].text;

            if (!name) { alert('אנא הזן שם מלא בטופס ההזמנה'); return; }
            if (!phone) { alert('אנא הזן מספר טלפון ליצירת קשר'); return; }
            if (deliveryVal === 'shipping' && !address) {
                alert('בחרת במשלוח עד הבית - אנא הזן כתובת למשלוח');
                return;
            }

            const total = document.getElementById('cart-total').innerText;

            let text = "היי איתי! הזמנה חדשה מהאתר *3DPrintNesher* 🚀\n\n";
            
            text += "*👤 פרטי המזמין:*\n";
            text += `▪️ שם: ${name}\n`;
            text += `▪️ טלפון: ${phone}\n`;
            if (deliveryVal === 'shipping') {
                text += `▪️ כתובת למשלוח: ${address}\n`;
            }
            
            text += `\n*📦 פריטים בהזמנה:*\n`;

            cart.forEach(item => {
                text += `▪️ ${item.name} (${item.price} ₪)`;
                if (item.chosenPrimary || item.chosenSecondary) {
                    text += ` [`;
                    if (item.chosenPrimary) text += `צבע: ${item.chosenPrimary}`;
                    if (item.chosenSecondary) text += ` | משני: ${item.chosenSecondary}`;
                    text += `]`;
                }
                text += `\n`;
            });

            text += `\n*🚚 אופן קבלה:* ${deliveryText}\n`;
            text += `*💳 תשלום מועדף:* ${paymentText}\n`;
            
            if (discount > 0) { text += `*🏷️ קופון:* הופעלה הנחה מהאתר\n`; }
            
            text += `\n*💰 סה"כ לתשלום: ${total} ₪*\n\n`;
            text += `אשמח לאישור הזמנה ופרטי תשלום!`;

            const encodedText = encodeURIComponent(text);
            const whatsappUrl = `https://wa.me/${MY_PHONE_NUMBER}?text=${encodedText}`;

            window.open(whatsappUrl, '_blank');
        }

        window.onload = initStore;
    </script>
</body>
</html>
