<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPrintNesher - חנות התלת מימד</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }
        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .catalog {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product h3 { margin-top: 0; color: #2c3e50; }
        .price { font-weight: bold; color: #27ae60; font-size: 1.2em; margin: 10px 0; }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
        .cart {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: fit-content;
        }
    </style>
</head>
<body>

    <header>
        <h1>חנות מוצרי התלת מימד של איתי</h1>
        <p>הדפסות אישיות באיכות גבוהה</p>
    </header>

    <div class="container">
        <main class="catalog">
            <div class="product">
                <div>
                    <h3>מעמד לטלפון</h3>
                    <p>מעמד שולחני מעוצב וחזק במיוחד</p>
                </div>
                <div>
                    <p class="price">40 ₪</p>
                    <button onclick="alert('המוצר נוסף לסל בהצלחה!')">הוסף לסל</button>
                </div>
            </div>

            <div class="product">
                <div>
                    <h3>מחזיק מפתחות מותאם</h3>
                    <p>הדפסת שם אישית לבחירתך</p>
                </div>
                <div>
                    <p class="price">25 ₪</p>
                    <button onclick="alert('המוצר נוסף לסל בהצלחה!')">הוסף לסל</button>
                </div>
            </div>

            <div class="product">
                <div>
                    <h3>עציץ גיאומטרי</h3>
                    <p>מתאים לסוקולנטים וקישוט המשרד</p>
                </div>
                <div>
                    <p class="price">35 ₪</p>
                    <button onclick="alert('המוצר נוסף לסל בהצלחה!')">הוסף לסל</button>
                </div>
            </div>
        </main>

        <aside class="cart">
            <h2>🛒 סל קניות</h2>
            <p id="cart-empty">הסל שלך ריק כרגע</p>
            <hr>
            <p><strong>סה"כ: 0 ₪</strong></p>
            <button style="background-color: #27ae60; width: 100%;">מעבר לקופה</button>
        </aside>
    </div>

</body>
</html>
