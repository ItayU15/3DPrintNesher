<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DPrintNesher - חנות התלת מימד</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        /* סרגל סינון ומיון */
        .controls-bar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-btn {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background-color: #3498db;
            color: white;
        }
        .sort-select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 0.9em;
            outline: none;
        }

        /* מבנה האתר */
        .container {
            display: flex;
            gap: 20px;
        }
        .catalog {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid #3498db;
        }
        .product h3 { margin: 0 0 5px 0; color: #2c3e50; }
        .category-tag {
            display: inline-block;
            background: #e8f4fd;
            color: #2980b9;
            font-size: 0.8em;
            padding: 3px 8px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .price { font-weight: bold; color: #27ae60; font-size: 1.3em; margin: 15px 0; }
        
        button.add-to-cart {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background 0.2s;
        }
        button.add-to-cart:hover { background-color: #2980b9; }
        
        .cart {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>חנות מוצרי התלת מימד של איתי</h1>
        <p>קטלוג דינמי עם סינון ומיון חכם</p>
    </header>

    <div class="controls-bar">
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterProducts('הכל', this)">כל המוצרים</button>
            <button class="filter-btn" onclick="filterProducts('קליקרים', this)">קליקרים</button>
            <button class="filter-btn" onclick="filterProducts('מחזיקי מפתחות', this)">מחזיקי מפתחות</button>
            <button class="filter-btn" onclick="filterProducts('חלקים נעים', this)">חלקים נעים</button>
            <button class="filter-btn" onclick="filterProducts('מיוחדים', this)">מיוחדים</button>
            <button class="filter-btn" onclick="filterProducts('מוצרים בעיצוב אישי', this)">עיצוב אישי</button>
        </div>
        
        <div>
            <select class="sort-select" onchange="sortProducts(this.value)">
                <option value="default">מיין לפי...</option>
                <option value="low-to-high">מחיר: מהנמוך לגבוה</option>
                <option value="high-to-low">מחיר: מהגבוה לנמוך</option>
            </select>
        </div>
    </div>

    <div class="container">
        <main class="catalog" id="catalog-container">
            </main>

        <aside class="cart">
            <h2>🛒 סל קניות</h2>
            <p id="cart-empty">הסל שלך ריק כרגע</p>
            <hr>
            <p><strong>סה"כ: 0 ₪</strong></p>
            <button style="background-color: #27ae60; width: 100%; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">מעבר לקופה</button>
        </aside>
    </div>

    <script src="products.js"></script>

    <script>
        let selectedCategory = 'הכל';
        let selectedSort = 'default';

        // פונקציה שמציירת את המוצרים על המסך
        function displayProducts() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = ''; // מנקים את מה שיש כרגע

            // 1. סינון לפי קטגוריה
            let displayedList = catalogProducts;
            if (selectedCategory !== 'הכל') {
                displayedList = catalogProducts.filter(p => p.category === selectedCategory);
            }

            // 2. מיון לפי מחיר
            if (selectedSort === 'low-to-high') {
                displayedList.sort((a, b) => a.price - b.price);
            } else if (selectedSort === High-to-low) {
                displayedList.sort((a, b) => b.price - a.price);
            }

            // אם אין מוצרים בקטגוריה הזו
            if (displayedList.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #777;">אין מוצרים להצגה בקטגוריה זו כרגע.</p>';
                return;
            }

            // 3. יצירת כרטיס לכל מוצר
            displayedList.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product';
                
                productCard.innerHTML = `
                    <div>
                        <span class="category-tag">${product.category}</span>
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                    </div>
                    <div>
                        <p class="price">${product.price} ₪</p>
                        <button class="add-to-cart" onclick="alert('${product.name} נוסף לסל (זמני)')">הוסף לסל</button>
                    </div>
                `;
                
                container.appendChild(productCard);
            });
        }

        // פונקציה שמופעלת בלחיצה על קטגוריה
        function filterProducts(category, buttonElement) {
            selectedCategory = category;
            
            // עדכון הכפתור הפעיל מבחינה עיצובית
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            
            displayProducts(); // ציור מחדש
        }

        // פונקציה שמופעלת בשינוי המיון
        function sortProducts(sortType) {
            selectedSort = sortType;
            displayProducts(); // ציור מחדש
        }

        // הפעלה ראשונית של האתר כשהדף עולה
        window.onload = displayProducts;
    </script>
</body>
</html>
